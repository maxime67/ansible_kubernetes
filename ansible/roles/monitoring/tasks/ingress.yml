---
- name: Copier le manifest Ingress Grafana
  copy:
    dest: /tmp/grafana-ingress.yaml
    content: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: grafana
        namespace: monitoring
        annotations:
          cert-manager.io/cluster-issuer: homelab-ca-issuer
      spec:
        ingressClassName: traefik
        tls:
          - hosts:
              - grafana.{{ homelab_domain }}
            secretName: grafana-tls
        rules:
          - host: grafana.{{ homelab_domain }}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: kube-prometheus-stack-grafana
                      port:
                        number: 80

- name: Appliquer l'Ingress Grafana
  become: false
  command: kubectl apply -f /tmp/grafana-ingress.yaml
  environment:
    KUBECONFIG: /home/debian/.kube/config
