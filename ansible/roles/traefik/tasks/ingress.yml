---
- name: Copier les manifests dashboard Traefik
  copy:
    dest: /tmp/traefik-dashboard.yaml
    content: |
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: traefik-dashboard-tls
        namespace: traefik
      spec:
        secretName: traefik-dashboard-tls
        issuerRef:
          name: homelab-ca-issuer
          kind: ClusterIssuer
        dnsNames:
          - traefik.{{ homelab_domain }}
      ---
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-to-dashboard
        namespace: traefik
      spec:
        redirectRegex:
          regex: ^https://traefik\.{{ homelab_domain | replace('.', '\\.') }}/?$
          replacement: https://traefik.{{ homelab_domain }}/dashboard/
          permanent: true
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: traefik-dashboard
        namespace: traefik
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`traefik.{{ homelab_domain }}`) && PathPrefix(`/`)
            kind: Rule
            middlewares:
              - name: redirect-to-dashboard
            services:
              - name: api@internal
                kind: TraefikService
          - match: Host(`traefik.{{ homelab_domain }}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
            kind: Rule
            services:
              - name: api@internal
                kind: TraefikService
        tls:
          secretName: traefik-dashboard-tls

- name: Appliquer les manifests dashboard Traefik
  become: false
  command: kubectl apply -f /tmp/traefik-dashboard.yaml
  environment:
    KUBECONFIG: /home/debian/.kube/config
