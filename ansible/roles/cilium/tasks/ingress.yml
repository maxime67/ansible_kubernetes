---
- name: Copier le manifest Ingress Hubble UI
  copy:
    dest: /tmp/hubble-ingress.yaml
    content: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: hubble-ui
        namespace: kube-system
        annotations:
          cert-manager.io/cluster-issuer: homelab-ca-issuer
      spec:
        ingressClassName: traefik
        tls:
          - hosts:
              - hubble.{{ homelab_domain }}
            secretName: hubble-tls
        rules:
          - host: hubble.{{ homelab_domain }}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: hubble-ui
                      port:
                        number: 80

- name: Appliquer l'Ingress Hubble UI
  become: false
  command: kubectl apply -f /tmp/hubble-ingress.yaml
  environment:
    KUBECONFIG: /home/debian/.kube/config
