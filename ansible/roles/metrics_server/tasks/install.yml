---
- name: Déployer le manifeste metrics-server
  become: false
  command: >
    kubectl apply -f
    https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  environment:
    KUBECONFIG: /home/debian/.kube/config

- name: Vérifier si --kubelet-insecure-tls est déjà présent
  become: false
  command: >
    kubectl get deployment metrics-server -n kube-system
    -o jsonpath='{.spec.template.spec.containers[0].args}'
  environment:
    KUBECONFIG: /home/debian/.kube/config
  register: metrics_args
  changed_when: false

# Les certificats kubelet sont auto-signés dans un cluster kubeadm,
# metrics-server ne peut pas les vérifier sans cette option.
- name: Patcher metrics-server pour les certificats kubelet auto-signés
  become: false
  command: >
    kubectl patch deployment metrics-server -n kube-system --type=json
    -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
  environment:
    KUBECONFIG: /home/debian/.kube/config
  when: "'kubelet-insecure-tls' not in metrics_args.stdout"

- name: Attendre que metrics-server soit prêt
  become: false
  command: kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s
  environment:
    KUBECONFIG: /home/debian/.kube/config
  changed_when: false
