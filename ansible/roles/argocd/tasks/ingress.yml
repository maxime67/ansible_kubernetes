---
- name: Copier le manifest Ingress ArgoCD
  copy:
    dest: /tmp/argocd-ingress.yaml
    content: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd
        namespace: {{ argocd_namespace }}
        annotations:
          cert-manager.io/cluster-issuer: homelab-ca-issuer
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
      spec:
        ingressClassName: traefik
        tls:
          - hosts:
              - argocd.{{ homelab_domain }}
            secretName: argocd-tls
        rules:
          - host: argocd.{{ homelab_domain }}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: argocd-server
                      port:
                        number: 80

- name: Appliquer l'Ingress ArgoCD
  become: false
  command: kubectl apply -f /tmp/argocd-ingress.yaml
  environment:
    KUBECONFIG: /home/debian/.kube/config
