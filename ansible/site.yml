---
- name: Préparer les nœuds
  hosts: all
  become: true
  roles:
    - swap
    - kernel
    - storage
    - containerd
    - kubernetes_packages

- name: Initialiser le control plane
  hosts: control_plane
  become: true
  roles:
    - k8s_control_plane
    - helm
    - cilium

- name: Joindre les workers au cluster
  hosts: workers
  become: true
  roles:
    - k8s_worker

- name: Installer les addons du cluster
  hosts: control_plane
  become: true
  roles:
    - crds
    - metrics_server
    - longhorn
    - metallb
    - cert_manager
    - traefik
    - argocd
    - monitoring

- name: Afficher les accès au cluster
  hosts: control_plane
  become: false
  environment:
    KUBECONFIG: /home/debian/.kube/config
  tasks:
    - name: Récupérer le mot de passe ArgoCD
      shell: kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath='{.data.password}' | base64 -d
      register: argocd_password
      changed_when: false
      failed_when: false

    - name: Récupérer le mot de passe Grafana
      shell: kubectl get secret kube-prometheus-stack-grafana -n monitoring -o jsonpath='{.data.admin-password}' | base64 -d
      register: grafana_password
      changed_when: false
      failed_when: false

    - name: Vérifier si Hubble UI est installé
      command: kubectl get deployment hubble-ui -n kube-system
      register: hubble_installed
      changed_when: false
      failed_when: false

    - name: Afficher les accès
      debug:
        msg:
          - "============================================"
          - "ArgoCD  → https://argocd.{{ homelab_domain }}"
          - "         login : admin"
          - "         mdp   : {{ argocd_password.stdout | default('secret non trouvé') }}"
          - "--------------------------------------------"
          - "Grafana → https://grafana.{{ homelab_domain }}"
          - "         login : admin"
          - "         mdp   : {{ grafana_password.stdout | default('secret non trouvé') }}"
          - "--------------------------------------------"
          - "Hubble  → {{ 'https://hubble.' + homelab_domain if hubble_installed.rc == 0 else 'non installé' }}"
          - "--------------------------------------------"
          - "Traefik → https://traefik.{{ homelab_domain }}"
          - "============================================"
